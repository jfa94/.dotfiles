approval_policy = "on-request"
default_permissions = "workspace-net"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_auto_compact_token_limit = 200000
web_search = "live"
model = "gpt-5.6-sol"

notify = ["/Users/Javier/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]
service_tier = "default"

[features]
hooks = true
js_repl = false

[permissions.workspace-net.filesystem]
glob_scan_max_depth = 32
"/" = "read"
"~/.codex" = "read"
"~/.codex/auth.json" = "deny"
"~/.ssh" = "deny"
"~/.aws/credentials" = "deny"
"~/.aws/config" = "deny"
"~/.config/gh/hosts.yml" = "read"
"~/.dotfiles" = "write"
"~/Projects" = "write"
"~/.dotfiles/**/.env" = "deny"
"~/.dotfiles/**/.env.*" = "deny"
"~/.dotfiles/**/secrets" = "deny"
"~/.dotfiles/**/secrets/**" = "deny"
"~/.dotfiles/**/*.pem" = "deny"
"~/.dotfiles/**/*.key" = "deny"
"~/.dotfiles/**/*.p12" = "deny"
"~/.dotfiles/**/*.pfx" = "deny"
"~/Projects/**/.env" = "deny"
"~/Projects/**/.env.*" = "deny"
"~/Projects/**/secrets" = "deny"
"~/Projects/**/secrets/**" = "deny"
"~/Projects/**/*.pem" = "deny"
"~/Projects/**/*.key" = "deny"
"~/Projects/**/*.p12" = "deny"
"~/Projects/**/*.pfx" = "deny"
"/tmp" = "write"
"/private/tmp" = "write"
"/var/tmp" = "write"

[permissions.workspace-net.filesystem.":workspace_roots"]
"." = "write"
"**/.env" = "deny"
"**/.env.*" = "deny"
"**/secrets" = "deny"
"**/secrets/**" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.p12" = "deny"
"**/*.pfx" = "deny"
"**/id_rsa" = "deny"
"**/id_ed25519" = "deny"

[permissions.workspace-net.filesystem.":tmpdir"]
"." = "write"

[permissions.workspace-net.network]
enabled = true
mode = "limited"

[permissions.workspace-net.network.domains]
"registry.npmjs.org" = "allow"
"**.npmjs.org" = "allow"
"**.pnpm.io" = "allow"
"github.com" = "allow"
"api.github.com" = "allow"
"raw.githubusercontent.com" = "allow"
"objects.githubusercontent.com" = "allow"
"**.githubusercontent.com" = "allow"
"**.supabase.com" = "allow"
"**.posthog.com" = "allow"
"**.stripe.com" = "allow"
"**.figma.com" = "allow"
"developers.openai.com" = "allow"
"api.openai.com" = "allow"

[projects."/Users/Javier/Projects/youtube-subscriptions-cleaner-plugin"]
trust_level = "trusted"

[projects."/Users/Javier"]
trust_level = "trusted"

[projects."/Users/Javier/.dotfiles"]
trust_level = "trusted"

[projects."/Users/Javier/Projects/factory-plugin"]
trust_level = "trusted"

[projects."/Users/Javier/Projects/outsidey"]
trust_level = "trusted"

[projects."/home/javier/Projects/factory"]
trust_level = "trusted"

[tui]
alternate_screen = "always"
notifications = true
notification_condition = "unfocused"
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-used",
  "context-window-size",
  "five-hour-limit",
]
status_line_use_colors = true

[tui.keymap.editor]
insert_newline = ["shift-enter", "ctrl-enter"]

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

[plugins."github@openai-curated"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true

[plugins."stripe@openai-curated"]
enabled = true

[plugins."supabase@openai-curated"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true
