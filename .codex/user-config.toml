approval_policy = "on-request"
approvals_reviewer = "user"
default_permissions = "workspace-net"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "xhigh"
model_auto_compact_token_limit = 200000
web_search = "live"
model = "gpt-5.6-sol"

service_tier = "default"

notify = ["/Users/Javier/.codex/plugins/cache/openai-bundled/computer-use/1.0.1000451/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[shell_environment_policy]
ignore_default_excludes = false

[features]
hooks = true
js_repl = false

[permissions.workspace-net.filesystem]
glob_scan_max_depth = 32
"/" = "read"
"~/.codex" = "read"
"~/.codex/auth.json" = "deny"
"~/.ssh" = "deny"
"~/.aws/credentials" = "deny"
"~/.aws/config" = "deny"
"~/.config/gh/hosts.yml" = "read"
"~/.dotfiles" = "write"
"~/Projects" = "write"
"~/.dotfiles/**/secrets" = "deny"
"~/.dotfiles/**/secrets/**" = "deny"
"~/.dotfiles/**/*.pem" = "deny"
"~/.dotfiles/**/*.key" = "deny"
"~/.dotfiles/**/*.p12" = "deny"
"~/.dotfiles/**/*.pfx" = "deny"
"~/Projects/**/secrets" = "deny"
"~/Projects/**/secrets/**" = "deny"
"~/Projects/**/*.pem" = "deny"
"~/Projects/**/*.key" = "deny"
"~/Projects/**/*.p12" = "deny"
"~/Projects/**/*.pfx" = "deny"
"/tmp" = "write"
"/private/tmp" = "write"
"/var/tmp" = "write"

[permissions.workspace-net.filesystem.":workspace_roots"]
"." = "write"
".git" = "write"
"**/secrets" = "deny"
"**/secrets/**" = "deny"
"**/*.pem" = "deny"
"**/*.key" = "deny"
"**/*.p12" = "deny"
"**/*.pfx" = "deny"
"**/id_rsa" = "deny"
"**/id_ed25519" = "deny"

[permissions.workspace-net.filesystem.":tmpdir"]
"." = "write"

[permissions.workspace-net.network]
enabled = true
mode = "limited"

[permissions.workspace-net.network.domains]
"registry.npmjs.org" = "allow"
"**.npmjs.org" = "allow"
"**.pnpm.io" = "allow"
"github.com" = "allow"
"api.github.com" = "allow"
"raw.githubusercontent.com" = "allow"
"objects.githubusercontent.com" = "allow"
"**.githubusercontent.com" = "allow"
"**.supabase.com" = "allow"
"**.posthog.com" = "allow"
"**.stripe.com" = "allow"
"**.figma.com" = "allow"
"developers.openai.com" = "allow"
"api.openai.com" = "allow"

[projects."/Users/Javier/Projects/youtube-subscriptions-cleaner-plugin"]
trust_level = "trusted"

[projects."/Users/Javier"]
trust_level = "trusted"

[projects."/Users/Javier/.dotfiles"]
trust_level = "trusted"

[projects."/Users/Javier/Projects/factory-plugin"]
trust_level = "trusted"

