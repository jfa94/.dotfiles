[tui]
alternate_screen = "always"
notifications = true
notification_condition = "unfocused"
status_line = ["model", "current-dir", "git-branch", "branch-changes", "context-used", "context-window-size", "five-hour-limit", "weekly-limit"]
status_line_use_colors = true

[tui.keymap.editor]
insert_newline = ["shift-enter", "ctrl-enter"]

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

