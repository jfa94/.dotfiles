name: Quality Gate

on:
    pull_request:
        branches: [staging]

concurrency:
    group: quality-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    quality:
        name: Quality
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm typecheck
            - run: pnpm lint
            - run: pnpm test
            - run: pnpm deps:validate
            - run: pnpm audit --audit-level=high

    security:
        name: Security Scan
        runs-on: ubuntu-latest
        needs: quality
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Semgrep SAST
              uses: semgrep/semgrep-action@v1
              with:
                  config: >-
                      p/typescript
                      p/security-audit
                      p/secrets
            - name: TruffleHog secrets scan
              uses: trufflesecurity/trufflehog@main
              with:
                  extra_args: --only-verified

    mutation:
        name: Mutation Testing
        runs-on: ubuntu-latest
        needs: quality
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm stryker

    auto-merge:
        name: Auto Merge
        runs-on: ubuntu-latest
        needs: [quality, mutation, security]
        if: github.actor != 'dependabot[bot]'
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
            - run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
              env:
                  GH_TOKEN: ${{ github.token }}
